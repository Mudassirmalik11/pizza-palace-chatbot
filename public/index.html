    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pizza Palace Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      height: 620px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #e63946;
      color: white;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-info h3 { font-size: 16px; }
    .header-info p  { font-size: 12px; opacity: 0.85; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.bot {
      background: #f1f1f1;
      color: #222;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #e63946;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    /* ✅ NEW: blinking cursor while streaming */
    .message.bot.streaming::after {
      content: "▋";
      animation: blink 0.7s infinite;
      color: #e63946;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .chat-input {
      padding: 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
    }

    .chat-input input:focus { border-color: #e63946; }

    .chat-input button {
      background: #e63946;
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-input button:hover    { background: #c1121f; }
    .chat-input button:disabled { background: #ccc; cursor: not-allowed; }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="avatar">🍕</div>
    <div class="header-info">
      <h3>Pizza Palace</h3>
      <p>Bella • Support Assistant</p>
    </div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="message bot">
      Hi there! Welcome to Pizza Palace 🍕 How can I help you today?
    </div>
  </div>

  <div class="chat-input">
    <input
      type="text"
      id="userInput"
      placeholder="Ask about our menu, delivery..."
      autocomplete="off"
    />
    <button id="sendBtn">➤</button>
  </div>

</div>

<script>
  const messages     = [];
  const messagesDiv  = document.getElementById("messages");
  const userInput    = document.getElementById("userInput");
  const sendBtn      = document.getElementById("sendBtn");

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("message", sender);
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return div; // return the div so we can update it later
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    userInput.value = "";
    sendBtn.disabled = true;

    messages.push({ role: "user", content: text });

    // create empty bot bubble — we'll fill it word by word
    const botDiv = addMessage("", "bot");
    botDiv.classList.add("streaming"); // shows blinking cursor

    let fullReply = "";

    // ✅ EventSource reads the stream from server
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    // read chunks as they arrive
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      // decode the chunk into text
      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");

      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const data = JSON.parse(line.slice(6)); // remove "data: "

          if (data.done) {
            // stream finished
            botDiv.classList.remove("streaming"); // remove cursor
            messages.push({ role: "assistant", content: fullReply });
            sendBtn.disabled = false;
            userInput.focus();
          } else {
            // new word chunk arrived — append it
            fullReply += data.text;
            botDiv.textContent = fullReply;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
          }
        }
      }
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  userInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
